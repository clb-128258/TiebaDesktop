name: Test Version Build

on:
  schedule:
    # 1) 定时触发：使用 Cron 表达式（分 时 日 月 周）。
    # 这里设定为每天凌晨 2:00 (UTC+8 北京时间) 执行，你可以根据需要调整
    - cron: '0 18 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上通过点击按钮手动触发，极大方便调试

jobs:
  build-and-pack:
    runs-on: windows-2022

    steps:
      # ==========================================
      # 0) 克隆仓库
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 1) 准备好相关工具链
      # ==========================================
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 配置 MSVC 编译器和 Windows SDK 环境，后续步骤中执行 cmake 将自动调用它们
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      
      # 验证预装的工具链是否存在（可选步骤，方便在日志中查看版本）
      - name: Verify Pre-installed Tools
        run: |
          cmake --version
          7z
          makensis /VERSION

      # ==========================================
      # 2) 根据 requirements.txt 安装特定 python 库
      # ==========================================
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}\src\requirements.txt

      # ==========================================
      # 3) 修补 aiotieba
      # ==========================================
      - name: Patch aiotieba
        run: |
          python -c "
          import shutil, os
          
          aiotieba_path = os.getenv('Python_ROOT_DIR') + r'\Lib\site-packages\aiotieba'
          patch_dir = r'${{ github.workspace }}\aiotieba-fix-files' 
          
          if os.path.exists(patch_dir):
              for item in os.listdir(patch_dir):
                  s = os.path.join(patch_dir, item)
                  d = os.path.join(aiotieba_path, item)
                  if os.path.isdir(s):
                      shutil.copytree(s, d, dirs_exist_ok=True)
                  else:
                      shutil.copy2(s, d)
              print('Patch aiotieba succeed:', aiotieba_path)
          else:
              print('Patch aiotieba failed, because of dir does not exist:', patch_dir)
          "

      # ==========================================
      # 4) 把 ffmpeg.exe 放置在特定目录下
      # ==========================================
      - name: Place FFmpeg Executable
        run: |
          $target_dir = "${{ github.workspace }}\src\binres"   
          choco install ffmpeg -y
          Copy-Item "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe" -Destination "$target_dir\" -Force
          echo "copy ffmpeg succeed!"

      # ==========================================
      # 5) 编译 C++ DLL
      # ==========================================
      - name: Compile C++ DLL
        run: |
          cd ${{ github.workspace }}\src\publics\winrt_url_share
          ${{ github.workspace }}\src\publics\winrt_url_share\run_build.bat
          cd ${{ github.workspace }}

      # ==========================================
      # 6) 安装 pyinstaller 库
      # ==========================================
      - name: Install PyInstaller
        run: pip install pyinstaller

      # ==========================================
      # 7) 设置构建配置文件 (只在本地修改，不 push)
      # ==========================================
      - name: Generate Build Configuration JSON
        env:
          # 从 GitHub 上下文中获取提交 Hash（完整的 40 位哈希）
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python -c "
          import json, sys, os, pathlib
          
          config_path = r'${{ github.workspace }}\build-tools\build_config.json'
          full_sha = os.getenv('COMMIT_SHA', 'unknown')
          short_sha = full_sha[:7]
          
          with open(config_path, 'rt', encoding='utf-8') as f:
              cfg_json_item = json.loads(f.read())
          
          cfg_json_item['src_code_path'] = os.path.join(os.environ['GITHUB_WORKSPACE'], 'src')
          cfg_json_item['py_environ_path'] = str(pathlib.Path(sys.executable).parent.parent if pathlib.Path(sys.executable).parent.name == 'Scripts' else pathlib.Path(sys.executable).parent)
          cfg_json_item['sevenzip_path'] = 'C:\\Program Files\\7-Zip\\7z.exe'
          
          cfg_json_item['installer_cfg']['build_nsis'] = False
          
          cfg_json_item['version']['version_string'] = cfg_json_item['version']['version_string'] + '-github-actions'
          cfg_json_item['version']['git_last_commit_hash'] = short_sha
          
          with open(config_path, 'w', encoding='utf-8') as f:
              json.dump(cfg_json_item, f, indent=4)
          print('Build config has successfully generated:')
          print(json.dumps(cfg_json_item, indent=4))
          "

      # ==========================================
      # 8) 执行构建脚本
      # ==========================================
      - name: Run Build Script
        working-directory: ${{ github.workspace }}\build-tools
        run: python ${{ github.workspace }}\build-tools\build.py --makefile ${{ github.workspace }}\build-tools\build_config.json

      # ==========================================
      # 9) 保存产物 (Artifacts)，其余文件随虚拟机销毁自动丢弃
      # ==========================================
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TiebaDesktop-daily-build-version-win64
          path: ${{ github.workspace }}/build-tools/work_out/*.zip
          if-no-files-found: error # 如果 work_out 目录下没有文件，则让 Action 报错，方便排查构建脚本是否运行成功